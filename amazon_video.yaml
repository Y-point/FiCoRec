gpu_id: '0'
log_wandb: False

proj_hid: 128
proj_out: 64
cl_weight: 0.3
temperature: 0.06

mask_prob: 0.2
span_max_len: 30
scale_range: [0.9, 1.1]  
noise_std: 0.2
mixup_alpha: 0.5
mixup_prob: 1.0
sim_threshold: 0.0
enable_mixup_epoch: 0

tail_k: 7

hidden_size: 128
num_layers: 1
dropout_prob: 0.2
loss_type: 'CE'

aug_types:
  - mask
  - scale
  - noise
  - semantic_mixing      

aug_num: 2

d_state: 32
d_conv: 4
expand: 4


cl_seq_weight: 0.9
cl_tail_weight: 0.5
cl_global_weight: 0.2


dataset: amazon-video-games
MAX_ITEM_LIST_LENGTH: 50

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
load_col:
    inter: [user_id, item_id, timestamp]

user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

epochs: 300
train_batch_size: 2048
learner: adam
learning_rate: 0.001
eval_step: 1
stopping_step: 10
train_neg_sample_args: ~

metrics: ['NDCG', 'MRR']
valid_metric: NDCG@10
eval_batch_size: 4096
weight_decay: 0.0
topk: [10,20]

